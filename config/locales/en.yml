            data_collection_text_html: "Autour D'Un Soir collects the following personal data as part of its activity:<br>• First and last name<br>• Email address<br>• Phone number<br>• Postal address<br>• Payment information<br>• Measurements (for rentals and customizations)"
            data_use: "Data use"
            data_use_text_html: "Collected data is used to:<br>• Process orders and bookings<br>• Manage customer relationships<br>• Send commercial information (with consent)<br>• Improve our services<br>• Comply with legal obligations"
            data_protection: "Data protection"
            data_protection_text: "Autour D'Un Soir implements all appropriate technical and organizational measures to protect your personal data against destruction, loss, alteration, unauthorized disclosure, or unauthorized access."
            your_rights: "Your rights"
            your_rights_text_html: "In accordance with GDPR, you have the following rights:<br>• Right of access<br>• Right to rectification<br>• Right to erasure<br>• Right to restriction of processing<br>• Right to portability<br>• Right to object<br>To exercise your rights, contact us via (%{contact_form_link})"
            data_retention: "Data retention"
            data_retention_text: "Your data is retained for the period necessary for the purposes for which it is processed, and in accordance with legal retention obligations."
            data_transfer: "Data transfer"
            data_transfer_text: "Your personal data is not transferred outside the European Union. It may be shared with our service providers (payment, delivery) only for the performance of our services."
          cookies:
            title: "Cookies Policy"
            what_is_cookie: "What is a cookie?"
            what_is_cookie_text: "A cookie is a small text file stored on your computer or mobile device when visiting our website. Cookies help remember your preferences and improve your browsing experience."
            types_used: "Types of cookies used"
            essential_title: "Essential cookies"
            essential_text: "Required for website operation (cart, login, security)"
            performance_title: "Performance cookies"
            performance_text: "Used to analyze website usage and improve our services"
            functionality_title: "Functionality cookies"
            functionality_text: "Remember your preferences (language, region, display)"
            advertising_title: "Advertising cookies"
            advertising_text: "Used to display relevant ads (with your consent)"
            management: "Cookie management"
            management_text: "You can change your cookie preferences at any time by clicking the \"Manage cookies\" button at the bottom of the page. You can also configure your browser to reject all cookies or to alert you when a cookie is sent."
            warning: "Warning: refusing essential cookies may affect website functionality"
          intellectual_property:
            title: "Intellectual Property"
            content_1: "All website content (texts, images, videos, logos, graphics, etc.) is the exclusive property of Autour D'Un Soir or its partners. Any reproduction, representation, modification, publication, or adaptation of all or part of website elements, by any means or process, is prohibited without prior written authorization from Autour D'Un Soir."
            content_2: "Any unauthorized use of the website or any element it contains will be considered infringement and prosecuted in accordance with applicable intellectual property law."
            trademarks: "Trademarks"
            trademarks_text: "\"Autour D'Un Soir\" and its logo are registered trademarks. Any reproduction or use of these marks without express authorization is strictly prohibited."
            hyperlinks: "Hyperlinks"
            hyperlinks_text: "Creating hyperlinks to the Autour D'Un Soir website requires prior authorization. Autour D'Un Soir reserves the right to request removal of a link if the source website does not comply with applicable laws."
        contact_form: "contact form"
        cta_questions:
          title: "Questions or claims?"
          description: "For any question regarding these terms or any claim, feel free to contact us."
          contact_button: "Contact us"
          mediation_title: "Mediation and disputes"
          mediation_text_html: "In accordance with Article L.612-1 of the French Consumer Code, you may use a consumer mediator free of charge in case of dispute. Mediator details are available upon request.<br>In case of dispute, French courts shall have exclusive jurisdiction."
        back_to_top: "Back to top"
        shipping_table:
          weight_min: "Minimum weight"
          weight_max: "Maximum weight"
          shipping_fee: "Shipping fee"
        articles:
          perimetre:
            a1: { title: "Scope of terms", content: "These General Terms of Sale apply as soon as you access the Autour D'Un Soir online shop at https://a1soir.com/ (the \"Website\") or place orders by phone. However, these terms do not apply to purchases made directly in our Cannes boutique." }
            a2: { title: "Definitions", content: "References to \"we\" or \"our\" mean Autour D'Un Soir, while \"you\" refers to the user of the Website." }
            a3: { title: "Acceptance of terms", content: "Please read these terms carefully before using the Website and placing an order. By accessing any part of the Website or ordering products, you agree to be bound by these terms. We recommend keeping a copy for future reference." }
            a4: { title: "Language and applicability", content: "These terms are available only in French and apply to orders delivered in France." }
          contrat:
            a1: { title: "Product availability", content: "All products and services offered on the Website are subject to availability." }
            a2: { title: "Order finalization", content: "Finalizing your order means accepting our offer and confirming your intention to purchase products or services as described on the Website, at the stated price, and acknowledging that the order creates a payment obligation." }
            a3: { title: "Personal use", content: "The Website is intended exclusively for private consumers and personal use. Products must not be resold or used for commercial purposes. We reserve the right to refuse multiple-item orders from one customer or to one address." }
          deroulement:
            a1: { title: "Item selection", content: "You can select items from our product range and add them to your cart by clicking \"Add to Cart\"." }
            a2: { title: "Purchase process", content: "By clicking \"Order\", you start the purchase process. You will review item references, sizes, prices, quantities, delivery methods, related costs, and available options, then provide your personal data and payment details." }
            a3: { title: "Acceptance of terms", content: "You must check the box accepting the general terms of sale before validating your order. By clicking \"Order\", you finalize your order subject to product availability and payment validity." }
            a4: { title: "Confirmation email", content: "You will automatically receive an email confirming receipt and details of your order. This is only an acknowledgment of receipt, not confirmation of product availability." }
            a5: { title: "Delivery email", content: "You will receive a second email confirming availability of ordered products. If none are available, your order is canceled and your card is not charged. If only some products are available, only those are delivered and charged." }
          prix_frais:
            intro: "All prices shown on the Website include VAT at the legal rate in effect on the billing date. Prices are in euros and exclude shipping fees. In rare cases, pricing errors may occur. If a correct price is lower, we charge the lower price. If higher, we may contact you or cancel the order."
          livraison:
            a1: { title: "Delivery areas", content: "We deliver products only in Metropolitan France and Corsica, excluding all other territories including military sites." }
            a2: { title: "Delivery times", content: "Estimated delivery times are 7 business days (excluding Saturdays, Sundays, and public holidays) from the Delivery Email. Delivery may take longer for hard-to-reach areas. We will make our best efforts to deliver within the indicated timeframe." }
            a3: { title: "Delivery timeframe guarantee", content: "Although we make every effort to deliver within the stated timelines, delivery dates are estimates only and are not guaranteed. Delays may occur due to postal services, carriers, logistics, or weather conditions. However, a maximum period of thirty (30) days from the Delivery Email is guaranteed." }
            a4: { title: "Late delivery", content_html: "If we cannot meet the initial delivery timeline indicated in the Delivery Email, we will inform you as soon as possible and provide a revised estimate, without liability. You may cancel your order if total delivery exceeds thirty (30) days. To cancel, contact us via %{contact_link}. We will refund the card used for payment within fourteen (14) days of receiving your cancellation request." }
            a5: { title: "Receipt verification", content: "If you have not received your order within the indicated timeframe, first check with your local post office whether they hold your parcel. If not, contact us and we will assist you. Delivery delays may occur during seasonal peaks or due to weather or unforeseen events. The carrier requires a signature upon delivery." }
            a6: { title: "Multiple deliveries", content: "If you order multiple products, we may need to deliver them in several shipments. If so, you will be informed in advance." }
            a7: { title: "Parcel inspection", content_html: "When receiving your parcel, please check its condition. You are responsible for the parcel and its contents once delivered. In case of issue (opened parcel, empty parcel, damaged content), refuse the parcel and contact customer service to report the reason (customer service: %{contact_link}). If missing items are not reported with proper reservation, Autour D'Un Soir cannot be held responsible and we cannot guarantee reimbursement." }
            a8: { title: "Delivery address", content: "Your order will be sent to the delivery address provided at checkout. We cannot be held responsible if this address is incorrect or incomplete." }
          cgl:
            a1: { title: "Purpose of rental", content: "These general terms govern rental of outfits and accessories offered by Autour D'Un Soir. Each rental is personal and nominative." }
            a2: { title: "Booking", content: "Rental booking can be made in boutique only. It becomes final after payment of a 30% deposit. The balance is due no later than pickup." }
            a3: { title: "Rental duration", content: "Standard rental duration is 3-4 days. Pickup and return dates are specified at booking. Any extension must be approved in advance and will incur additional charges." }
            a4: { title: "Deposit", content_html: "A deposit proportional to the outfit value is required at pickup.<br>The deposit may be retained in whole or in part in case of:<br>• Late return<br>• Significant damage or heavy soiling<br>• Loss or theft of rented item<br>• Breach of rental terms" }
            a5: { title: "Fitting and alterations", content: "A prior fitting is strongly recommended. Minor alterations may be done free of charge within reason. Major alterations require a quote and additional charge." }
            a6: { title: "Renter responsibility", content_html: "The renter agrees to:<br>• Take care of the rented outfit<br>• Not modify or alter the item<br>• Not sub-rent the outfit<br>• Return the outfit on time<br>• Report any accidental damage immediately" }
            a7: { title: "Cancellation", content_html: "If canceled by the customer:<br>• Within 14 days of booking: full refund<br>• After 14 days: store credit valid for 1 year<br>The deposit remains due to Autour D'Un Soir except in justified force majeure cases." }
            a8: { title: "Maintenance", content: "Maintenance and cleaning are included in rental price. The renter must never clean the outfit themselves. Exceptional soiling requiring special treatment may incur extra fees." }
            a9: { title: "Insurance", content: "We recommend that renters subscribe to insurance covering possible damages, such as civil liability insurance." }
          paiement:
            a1: { title: "Payment methods", content: "Payment for products must be made by bank card, American Express, or Apple Pay, according to the instructions shown on the payment page." }
            a2: { title: "Card charge", content: "Full payment, including shipping and any additional service fees, will be charged to your card or Apple Pay account after product availability is verified, at or shortly before shipment. We will deliver products only if payment is successful." }
            a3: { title: "Card validation", content: "You confirm that the bank card used is yours. Cardholders are subject to validation checks and issuer authorization. If your card issuer refuses authorization, we may refuse delivery and are not responsible for resulting delays or non-delivery. We will inform you by email." }
            a4: { title: "Bank data security", content: "Your banking data is processed securely, in accordance with our Privacy Policy available above in this document." }
          retractation:
            a1: { title: "Return of products", content: "You may return only products purchased directly on the Website. Products bought in our Cannes boutique must be returned to the store. We reserve the right to refuse returns that do not meet the conditions below; return shipping costs are at your expense." }
            a2: { title: "Withdrawal conditions", content: "If for any reason you are not satisfied or wish to cancel, you may exercise your right of withdrawal no later than fourteen (14) days after receiving your order, subject to the conditions stated in this article and applicable law." }
            a3: { title: "Refund", content: "In accordance with consumer law, we refund product prices and delivery costs to the original payment method. Refunds are made as soon as possible and no later than fourteen (14) days after receiving returned goods." }
            a4: { title: "Care of products", content: "Please take care of products while in your possession and return them without undue delay, no later than fourteen (14) days after exercising withdrawal. If products are not properly cared for or returned under stated conditions, refund may be refused." }
          garanties:
            a1: { title: "Scope", content: "You benefit from the guarantees listed in this section only for products purchased directly on the Website." }
            a2: { title: "Legal conformity guarantee", content_html: "You benefit from legal guarantees, including conformity guarantee. If products are non-compliant, you have two years from delivery to contact customer service via %{contact_link} or by mail, and return non-compliant products. We will send replacement products when available, or provide appropriate remedy." }
            a3: { title: "Proof of defect", content: "You are exempt from proving the existence of a conformity defect during the first twenty-four (24) months after delivery." }
            a4: { title: "Independence of guarantees", content: "The legal conformity guarantee applies independently of any commercial guarantee and regardless of product nature." }
            a5: { title: "Hidden defects guarantee", content: "The legal guarantee against hidden defects applies. If a hidden defect is proven, we are legally required to remedy its consequences. You may choose rescission of sale or price reduction in accordance with civil law." }
            a6: { title: "Return shipping costs", content: "In case of replacement or refund, we cover return shipping costs." }
          informations_personnelles:
            a1: { title: "Accuracy of information", content: "By providing information on the Website, you guarantee your true identity and that all information provided is true, accurate, up to date, and complete." }
            a2: { title: "Information updates", content: "If information provided is incorrect or no longer valid, you must update it. Otherwise, we cannot be held liable for resulting consequences." }
            a3: { title: "Use of information", content: "Personal information provided through the Website is recorded and used only in accordance with our Privacy Policy, available above." }
            a4: { title: "Data storage", content: "By placing an order, you accept that we may store and process your personal data. We fully respect the privacy of users of this Website." }
          responsabilite:
            a1: { title: "Limitation of liability", content: "We are not liable for losses or damages resulting from force majeure, unforeseeable and unavoidable acts of third parties, or your own actions." }
            a2: { title: "Breach of terms", content: "In case of breach of these terms, we will send formal notice to remedy. If unresolved after fifteen (15) days, we may refuse access to the Website or future orders." }
          disponibilite_site:
            a1: { title: "Website availability", content: "The Website is provided as-is. We do not guarantee uninterrupted 24/7 availability. Access may be interrupted without notice for technical issues or maintenance." }
            a2: { title: "Device protection", content: "You are responsible for protecting your computer or any device used to access the Website. We are not liable for device damage or data loss resulting from Website use." }
          commentaires_reclamations:
            content_html: "We invite you to share feedback so we can continuously improve. Our goal is to resolve issues quickly and fairly. Please send comments, questions, or claims via customer service through the Contact section (%{contact_link}). You may also call 04 93 45 17 17. If you file a claim, state it clearly; we aim to respond within seven (7) business days."
          propriete_intellectuelle:
            a1: { title: "No ownership rights", content: "Your use of the Website gives you no intellectual property rights over the Website or its content, including copyrights, designs, and trademarks owned by us or third parties." }
            a2: { title: "Personal use", content: "The Website is made available for personal, non-commercial use only. Its content may not be used for other purposes without our express written permission." }
          modification_cgv:
            content: "We reserve the right to modify the Website and these terms at any time. Your use and orders are governed by terms in force at the time of use or order, unless legal or regulatory changes require otherwise."
          non_renonciation:
            content: "Failure by either party to enforce any provision of these terms does not constitute waiver, unless expressly and in writing."
          stipulations_finales:
            a1: { title: "Applicable law", content: "These terms are governed by French law." }
            a2: { title: "Severability", content: "If any provision of these terms is held invalid, void, or unenforceable, that provision is severable and does not affect validity or enforceability of remaining provisions." }
            a3: { title: "Registered trademarks", content: "Autour D'Un Soir and brands sold on the website are registered trademarks." }
          informations_legales:
            a1: { title: "Website publisher", content: "The Website is published by Autour D'Un Soir, a limited liability company with share capital of EUR 75,000, registered office at 29 boulevard Carnot, 06400 Cannes, France, registered with the Cannes Trade and Companies Register under number 880 559 414, phone +33 (0)4.93.45.17.17." }
            a2: { title: "Contact", content_html: "You can contact customer service via the Contact section on the online boutique (%{contact_link}). By phone Tuesday to Friday from 10:00 to 12:00 and 15:00 to 19:00, and Saturday from 10:00 to 16:00 at: 04 93 45 17 17." }
