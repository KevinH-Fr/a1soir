        sections:
          general:
            title: "General questions"
            q1:
              question: "Where is your boutique located?"
              contact_form: "contact form"
              answer_html: "<p><strong>Autour D'Un Soir</strong><br>%{address}</p><p><strong>Opening hours:</strong><br>%{hours}</p><p class='mb-0'><strong>Contact:</strong><br>%{phone}<br>Email: (%{contact_link})</p>"
            q2:
              question: "Do I need an appointment?"
              answer_html: "<p>An appointment is not mandatory but <strong>strongly recommended</strong>:</p><ul><li>Ensures a dedicated advisor is available</li><li>Lets us prepare a curated selection</li><li>Avoids waiting in high season</li><li>Required for fittings and alterations</li></ul><p class='mb-0'>Book online or by phone. Exception: during Cannes Festival, no appointment required.</p>"
            q3:
              question: "Can I come with family or friends for fittings?"
              answer_html: "<p>Of course:</p><ul><li>Spacious fitting rooms</li><li>Comfortable waiting area</li><li>Friendly atmosphere</li></ul><p class='mb-0'>Please tell us how many people will come with you.</p>"
            q4:
              question: "What if there is an accident or stain?"
              answer_html: "<p><strong>No worries.</strong> Please:</p><ol><li>Do not try to clean it yourself</li><li>Return the outfit normally, cleaning is included</li></ol><p>Light stains and normal wear are covered. Major damage may impact the deposit.</p>"
            q5:
              question: "Do you have outfits for children?"
              answer_html: "<p>Yes, we offer outfits for boys:</p><ul><li>Suits (6 months to 18 years)</li><li>Rental or purchase</li><li>Matching accessories</li></ul><p class='mb-0'>Adjusted rates and included alterations, just like adults.</p>"
          location:
            title: "Outfit rental"
            q1:
              question: "How does outfit rental work?"
              answer_html: "<p>Rental is simple and flexible:</p><ol><li><strong>Browse</strong> online or in store</li><li><strong>Book</strong> your outfit and dates</li><li><strong>Try on</strong> during an appointment</li><li><strong>Pick up</strong> before your event</li><li><strong>Return</strong> on time</li></ol><p class='mb-0'>Care and cleaning are included.</p>"
            q2:
              question: "What is the standard rental period?"
              answer_html: "<p>The standard period is <strong>4 days</strong>:</p><ul><li>Pickup: 2 days before event</li><li>Return: 2 days after event</li></ul><p class='mb-0'>Longer rentals are possible on request.</p>"
            q3:
              question: "How far in advance should I book?"
              answer_html: "<p>Recommended:</p><ul><li><strong>2-3 months</strong> for weddings</li><li><strong>3-4 weeks</strong> for standard events</li><li><strong>1-2 weeks minimum</strong> for urgent needs</li></ul><p class='mb-0'>Earlier booking means more choice.</p>"
            q4:
              question: "What if the outfit does not fit?"
              answer_html: "<p>We offer:</p><ul><li><strong>Free minor alterations</strong></li><li><strong>Pre-fitting</strong> before event</li><li><strong>Exchange</strong> if needed</li></ul><p class='mb-0'>Our workshop ensures a perfect fit.</p>"
            q5:
              question: "How much is the deposit?"
              answer_html: "<p>A deposit proportional to the outfit value is required.</p><p class='mb-0'>It is fully returned if the outfit is returned on time and in good condition.</p>"
            q6:
              question: "Can I rent a wedding dress?"
              answer_html: "<p>We do not rent wedding dresses for quality reasons.</p><p>We want each dress to be perfect for your special day.</p><p class='mb-0'>Final alterations are essential.</p>"
            q7:
              question: "Can I rent a dress online?"
              answer_html: "<p>Not at the moment.</p><p class='mb-0'>Our in-store advice and alterations are part of the service quality.</p>"
          sale:
            title: "Outfit sales"
            q1:
              question: "Can I buy an outfit I rented?"
              answer_html: "<p>Yes.</p><ul><li><strong>Buy-after-rent option</strong></li><li><strong>Installment payment</strong> possible</li></ul><p class='mb-0'>Contact us for details.</p>"
            q2:
              question: "Do you sell new outfits?"
              answer_html: "<p>Yes, including:</p><ul><li>Designer collections</li><li>Custom outfits</li><li>Matching accessories</li></ul><p class='mb-0'>Visit our boutique to discover them.</p>"
            q3:
              question: "What is the withdrawal period?"
              answer_html: "<p>You have <strong>14 days</strong> to exercise your right of withdrawal.</p><p>Conditions:</p><ul><li>Original condition</li><li>Unworn with tags</li><li>Original packaging</li><li>Not altered</li></ul><p class='mb-0'>Refund within 14 days after receiving returned product.</p>"
          alterations:
            title: "Alterations and customization"
            q1:
              question: "Are alterations included in rental price?"
              answer_html: "<p>Yes, minor alterations are included:</p><ul><li>Hem adjustments</li><li>Waist adjustments</li><li>Simple modifications</li></ul><p>Complex work may require a quote.</p>"
            q2:
              question: "Are alterations included in sale price?"
              answer_html: "<p>For outfits over <strong>1000 EUR</strong>, length alterations are included.</p><p>All other changes require a quote before approval.</p>"
            q3:
              question: "What are alteration lead times?"
              answer_html: "<p>Depending on complexity:</p><ul><li><strong>Simple</strong>: 2-3 days</li><li><strong>Standard</strong>: 5-7 days</li><li><strong>Complex</strong>: 10-14 days</li><li><strong>Express</strong>: 24-48h with surcharge</li></ul><p class='mb-0'>We adapt timing to workshop availability.</p>"
            q4:
              question: "Do you offer bespoke creations?"
              answer_html: "<p>Yes, including:</p><ul><li>Custom wedding dresses</li><li>Personalized suits</li><li>Designer modifications</li><li>Period costume replicas</li></ul><p class='mb-0'>Book an appointment for a personalized quote.</p>"
            q5:
              question: "Do you alter items not bought in your boutique?"
              answer_html: "<p>No, our workshop is fully dedicated to in-boutique items.</p>"
          delivery:
            title: "Delivery and pickup"
            q1:
              question: "Do you offer home delivery?"
              answer_html: "<p>Yes, options include:</p><ul><li><strong>In-store pickup</strong>: free</li><li><strong>Home delivery</strong>: for purchased items</li></ul><p class='mb-0'>Fees are provided at checkout.</p>"
            q2:
              question: "How do I return my rental?"
              answer_html: "<p>You can return:</p><ul><li><strong>In store</strong></li><li><strong>By courier</strong> (Cannes hotels)</li><li><strong>Drop-off point</strong> 7/7</li></ul><p class='mb-0'>Please do not clean the outfit yourself.</p>"
          payment:
            title: "Payment and pricing"
            q1:
              question: "What payment methods do you accept?"
              answer_html: "<p>We accept:</p><ul><li><strong>Cards</strong></li><li><strong>Cash</strong> in store</li><li><strong>Checks</strong> (conditions apply)</li><li><strong>Bank transfer</strong></li><li><strong>Secure online payment</strong></li></ul>"
            q2:
              question: "Is a deposit required at booking?"
              answer_html: "<p>Yes, a <strong>30%</strong> deposit is required.</p><ul><li>Secures your outfit</li><li>Balance paid at pickup</li><li>Rental deposit paid separately</li></ul>"
            q3:
              question: "Do you offer group pricing?"
              answer_html: "<p>Yes, we offer preferential group rates.</p><ul><li>Custom quote based on your project</li></ul><p class='mb-0'>Ideal for weddings, processions, and corporate events.</p>"
