          mediation_title: "Médiation et litiges"
          mediation_text_html: "Conformément à l'article L.612-1 du Code de la consommation, nous vous informons que vous pouvez recourir gratuitement à un médiateur de la consommation en cas de litige. Les coordonnées du médiateur seront communiquées sur demande.<br>En cas de litige, les tribunaux français seront seuls compétents."
