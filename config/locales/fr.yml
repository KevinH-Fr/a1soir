            title: "Location"
            description: "Portez des tenues d'exception sans engagement. Notre service de location vous permet d'accéder à une garde-robe haute couture pour vos événements spéciaux, à une fraction du prix d'achat. Service disponible uniquement à la boutique de Cannes. Robes de mariées exclues."
            features:
              "1": "Large choix de tenues et de tailles"
              "2": "Durée de location : 4 jours ou forfait 1 semaine"
              "3": "Retouches incluses"
              "4": "Entretien inclus"
          sale:
            title: "Vente"
            description: "Tombez amoureux d'une pièce ? Faites-en l'acquisition ! Notre boutique propose une sélection exclusive de tenues et accessoires que vous pouvez acheter pour enrichir votre garde-robe personnelle."
            features:
              "1": "Collections exclusives"
              "2": "Pièces uniques"
              "3": "Conseils personnalisés"
              "4": "Option d'achat après location"
          customization:
            title: "Personnalisation"
            description: "Chaque personne est unique, votre tenue aussi ! Notre atelier de retouches et de personnalisation s'assure que chaque pièce s'adapte parfaitement à votre morphologie et à votre style."
            features:
              "1": "Retouches sur mesure"
              "2": "Ajustements express"
              "3": "Création personnalisée"
              "4": "Service d'atelier expert"
        how_it_works:
          title: "Comment ça marche ?"
          step1:
            title: "Parcourez"
            description: "Explorez nos collections et trouvez la tenue parfaite pour votre événement"
          step2:
            title: "Réservez"
