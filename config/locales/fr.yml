            title: "Questions générales"
            q1:
              question: "Où se trouve votre boutique ?"
              contact_form: "formulaire de contact"
              answer_html: "<p><strong>Autour D'Un Soir</strong><br>%{address}</p><p><strong>Horaires d'ouverture :</strong><br>%{hours}</p><p class='mb-0'><strong>Contact :</strong><br>%{phone}<br>Email : (%{contact_link})</p>"
            q2:
              question: "Dois-je prendre rendez-vous ?"
              answer_html: "<p>Le rendez-vous n'est pas obligatoire mais <strong>fortement recommandé</strong> :</p><ul><li>Garantit la disponibilité d'une conseillère dédiée</li><li>Permet de préparer une sélection adaptée à vos goûts</li><li>Évite l'attente, surtout en haute saison</li><li>Nécessaire pour les essayages et retouches</li></ul><p class='mb-0'>Réservez votre créneau en ligne ou par téléphone ! Exception : Pendant le Festival de Cannes, pas de rendez-vous nécessaire.</p>"
            q3:
              question: "Puis-je venir avec mes proches lors de l'essayage ?"
              answer_html: "<p>Bien sûr ! Nous vous encourageons à venir accompagné(e) :</p><ul><li>Cabines d'essayage spacieuses</li><li>Espace d'attente confortable pour vos accompagnants</li><li>Ambiance conviviale et détendue</li></ul><p class='mb-0'>Merci de nous indiquer le nombre de personnes lors de la prise de rendez-vous.</p>"
            q4:
              question: "Que faire en cas d'accident ou de tache sur la tenue ?"
              answer_html: "<p><strong>Pas de panique !</strong> Voici la marche à suivre :</p><ol><li><strong>Ne tentez pas de nettoyer</strong> vous-même la tache</li><li>Retournez la tenue normalement, le nettoyage est inclus</li></ol><p>Les taches légères et l'usure normale sont couvertes. En cas de dommage important, une partie de la caution pourra être retenue.</p>"
            q5:
              question: "Avez-vous des tenues pour enfants ?"
              answer_html: "<p>Oui ! Nous proposons une belle sélection de tenues pour les garçons :</p><ul><li>Costumes pour garçons (6 mois à 18 ans)</li><li>Location ou vente</li><li>Accessoires assortis</li></ul><p class='mb-0'>Tarifs adaptés et retouches incluses, comme pour les adultes !</p>"
          location:
            title: "Location de tenues"
            q1:
              question: "Comment fonctionne la location de tenues ?"
              answer_html: "<p>La location chez Autour D'Un Soir est simple et flexible :</p><ol><li><strong>Parcourez</strong> notre catalogue en ligne ou venez en boutique</li><li><strong>Réservez</strong> votre tenue en indiquant les dates souhaitées</li><li><strong>Essayez</strong> la tenue lors d'un rendez-vous (retouches incluses)</li><li><strong>Récupérez</strong> votre tenue avant l'événement</li><li><strong>Retournez</strong> la tenue dans les délais</li></ol><p class='mb-0'>L'entretien et le nettoyage sont inclus dans le prix de location.</p>"
            q2:
              question: "Quelle est la durée standard de location ?"
              answer_html: "<p>La durée standard de location est de <strong>4 jours</strong> :</p><ul><li>Retrait : 2 jours avant votre événement</li><li>Retour : 2 jours après votre événement</li></ul><p class='mb-0'>Des locations plus longues sont possibles sur demande.</p>"
            q3:
              question: "Combien de temps à l'avance dois-je réserver ?"
              answer_html: "<p>Nous recommandons de réserver :</p><ul><li><strong>2 à 3 mois</strong> pour les mariages</li><li><strong>3 à 4 semaines</strong> pour les événements classiques</li><li><strong>1 à 2 semaines minimum</strong> pour les urgences</li></ul><p class='mb-0'>Plus vous réservez tôt, plus vous avez de choix.</p>"
            q4:
              question: "Que se passe-t-il si la tenue ne me va pas ?"
              answer_html: "<p>Pas de panique ! Nous proposons :</p><ul><li><strong>Retouches gratuites</strong> mineures</li><li><strong>Essayage préalable</strong> recommandé</li><li><strong>Échange possible</strong> si nécessaire</li></ul><p class='mb-0'>Notre atelier s'assure d'un ajustement parfait.</p>"
            q5:
              question: "Quel montant de caution est demandé ?"
              answer_html: "<p>Une caution proportionnelle à la valeur de la tenue est demandée lors du retrait.</p><p class='mb-0'>Elle est restituée si la tenue est rendue en bon état et dans les délais.</p>"
            q6:
              question: "Peut-on louer une robe de mariée ?"
              answer_html: "<p>Nous ne proposons pas de robe de mariée à la location pour des raisons de qualité.</p><p>Nous voulons garantir une robe parfaite pour votre grand jour.</p><p class='mb-0'>La coupe et les retouches définitives sont essentielles.</p>"
            q7:
              question: "Peut-on louer une robe en ligne ?"
              answer_html: "<p>Nous ne proposons pas encore la location à distance.</p><p class='mb-0'>Notre conseil et nos retouches en boutique font partie intégrante du service.</p>"
          sale:
            title: "Vente de tenues"
            q1:
              question: "Puis-je acheter une tenue que j'ai louée ?"
              answer_html: "<p>Oui, absolument !</p><ul><li><strong>Option d'achat</strong> après location</li><li><strong>Paiement en plusieurs fois</strong> possible</li></ul><p class='mb-0'>Contactez-nous pour les modalités.</p>"
            q2:
              question: "Proposez-vous des tenues neuves à la vente ?"
              answer_html: "<p>Oui, nous proposons :</p><ul><li>Collections de créateurs</li><li>Tenues sur mesure</li><li>Accessoires assortis</li></ul><p class='mb-0'>Venez en boutique pour découvrir la sélection.</p>"
            q3:
              question: "Quel est le délai de rétractation ?"
              answer_html: "<p>Vous disposez de <strong>14 jours</strong> pour exercer votre droit de rétractation.</p><p>Conditions :</p><ul><li>Tenue en état d'origine</li><li>Non portée avec étiquettes</li><li>Emballage d'origine</li><li>Tenue non retouchée</li></ul><p class='mb-0'>Remboursement sous 14 jours après réception du retour.</p>"
          alterations:
            title: "Retouches et personnalisation"
            q1:
              question: "Les retouches sont-elles incluses dans le prix de location ?"
              answer_html: "<p>Oui, les retouches mineures sont incluses :</p><ul><li>Ourlets</li><li>Ajustement de taille</li><li>Modifications simples</li></ul><p>Les retouches complexes peuvent nécessiter un devis.</p>"
            q2:
              question: "Les retouches sont-elles incluses dans le prix de vente ?"
              answer_html: "<p>Pour les tenues de plus de <strong>1000 €</strong>, les retouches de longueur sont incluses.</p><p>Toute autre retouche fait l'objet d'un <strong>devis</strong> avant validation.</p>"
            q3:
              question: "Quel est le délai pour les retouches ?"
              answer_html: "<p>Selon la complexité :</p><ul><li><strong>Simples</strong> : 2 à 3 jours</li><li><strong>Standards</strong> : 5 à 7 jours</li><li><strong>Complexes</strong> : 10 à 14 jours</li><li><strong>Express</strong> : 24-48h avec supplément</li></ul><p class='mb-0'>Nous adaptons les délais à l'agenda de l'atelier.</p>"
            q4:
              question: "Proposez-vous des créations sur mesure ?"
              answer_html: "<p>Oui, notre atelier propose :</p><ul><li>Robes de mariée sur mesure</li><li>Costumes personnalisés</li><li>Modifications de créateur</li><li>Répliques de costumes d'époque</li></ul><p class='mb-0'>Prenez rendez-vous pour un devis personnalisé.</p>"
            q5:
              question: "Est-ce que vous retouchez des produits qui ne viennent pas de votre boutique ?"
              answer_html: "<p>Non, notre atelier est déjà pleinement mobilisé sur les tenues de la boutique.</p>"
          delivery:
            title: "Livraison et retrait"
            q1:
              question: "Proposez-vous la livraison à domicile ?"
              answer_html: "<p>Oui, plusieurs options :</p><ul><li><strong>Retrait boutique</strong> : gratuit</li><li><strong>Livraison à domicile</strong> : pour les articles achetés</li></ul><p class='mb-0'>Les frais sont précisés lors de la validation.</p>"
            q2:
              question: "Comment retourner ma location ?"
              answer_html: "<p>Vous pouvez retourner :</p><ul><li><strong>En boutique</strong></li><li><strong>Par coursier</strong> (hôtels de Cannes)</li><li><strong>Point de dépôt</strong> 7j/7</li></ul><p class='mb-0'>Ne nettoyez pas la tenue vous-même.</p>"
          payment:
            title: "Paiement et tarifs"
            q1:
              question: "Quels moyens de paiement acceptez-vous ?"
              answer_html: "<p>Nous acceptons :</p><ul><li><strong>Cartes bancaires</strong></li><li><strong>Espèces</strong> en boutique</li><li><strong>Chèques</strong> (selon conditions)</li><li><strong>Virement</strong></li><li><strong>Paiement en ligne</strong> sécurisé</li></ul>"
            q2:
              question: "Faut-il payer un acompte à la réservation ?"
              answer_html: "<p>Oui, un acompte de <strong>30%</strong> est requis.</p><ul><li>Il sécurise la tenue</li><li>Le solde est réglé au retrait</li><li>La caution est demandée séparément</li></ul>"
            q3:
              question: "Proposez-vous des tarifs de groupe ?"
              answer_html: "<p>Oui, nous proposons des tarifs préférentiels pour les groupes.</p><ul><li>Devis adapté selon votre projet</li></ul><p class='mb-0'>Idéal pour mariages, cortèges et événements d'entreprise.</p>"
