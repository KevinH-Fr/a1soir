            data_protection: "Protection des données"
            data_protection_text: "Autour D'Un Soir met en œuvre toutes les mesures techniques et organisationnelles appropriées pour protéger vos données personnelles contre la destruction, la perte, l'altération, la divulgation non autorisée ou l'accès non autorisé."
