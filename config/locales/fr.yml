      le_concept:
        header_title: "Le concept"
        header_subtitle: "Découvrez notre concept unique de location de tenues"
        cta_title: "Prêt à en découvrir plus ?"
        sticky_text:
          block_1: "Autour D'Un Soir vous accompagne dans chaque étape de votre recherche de la tenue parfaite. Notre équipe experte est à votre écoute pour vous conseiller et vous guider vers des choix qui reflètent votre personnalité et sublimeront vos moments les plus précieux."
          block_2: "Découvrez notre sélection de tenues de soirée qui allient sophistication et modernité. Chaque pièce est soigneusement choisie pour vous offrir une expérience unique et mémorable."
          block_3: "Notre engagement est de vous offrir un service personnalisé et des tenues d'exception qui sauront sublimer vos moments les plus importants. Faites confiance à notre expertise."
        introduction:
          title: "Une nouvelle façon de vivre la mode"
          description: "Autour D'Un Soir révolutionne votre expérience vestimentaire avec un concept innovant qui allie élégance, accessibilité et personnalisation. Que ce soit pour un mariage, une soirée ou un événement spécial, nous vous offrons la liberté de choisir comment porter la mode."
          features:
            "1": "Location flexible"
            "2": "Vente exclusive"
            "3": "Sur mesure"
        pillars:
