        public_cards:
          experience:
            title: "Expérience"
            content: "<p class='text-center mb-0'>Plus de 20 ans d'expérience dans le domaine de la mode et de l'événementiel. Notre équipe connait parfaitement les tendances et les exigences de chaque type d'événement.</p>"
          expertise:
            title: "Expertise"
            content: "<p class='text-center mb-0'>Conseillères spécialisées en styling, retouches professionnelles sur place, et accompagnement personnalisé pour chaque client. Votre satisfaction est notre priorité.</p>"
          passion:
            title: "Passion"
            content: "<p class='text-center mb-0'>Une équipe passionnée par la mode et le service client. Nous prenons le temps de vous écouter pour vous proposer la tenue parfaite qui correspondra à vos attentes.</p>"
          quality:
            title: "Qualité"
            content: "<p class='text-center mb-0'>Sélection rigoureuse de nos créateurs et fournisseurs. Nous ne proposons que des pièces de qualité exceptionnelle pour garantir votre élégance.</p>"
          advice:
            title: "Conseil"
            content: "<p class='text-center mb-0'>Écoute attentive de vos besoins, conseils sur mesure et accompagnement tout au long de votre projet. Nous sommes là pour vous guider à chaque étape.</p>"
          trust:
            title: "Confiance"
            content: "<p class='text-center mb-0'>Des centaines de clients satisfaits nous font confiance chaque année. Découvrez nos avis et témoignages pour en savoir plus sur notre service.</p>"
        carousel:
          evening_wear:
            title: "Tenues de soirée"
            text: "Découvrez notre vaste collection de robes et tenues de soirée pour tous vos événements. Location ou achat, nous vous accompagnons dans votre choix pour que vous soyez parfaite le jour J."
          wedding_dresses:
            title: "Robes de mariée"
            text: "Trouvez la robe de mariée de vos rêves parmi notre sélection exclusive. De la dentelle classique aux créations modernes, chaque modèle est choisi pour sublimer votre jour le plus important."
          suits:
            title: "Costumes et smokings"
            text: "Messieurs, découvrez notre collection de costumes, smokings et tenues de cérémonie. Élégance et raffinement assurés pour tous vos événements prestigieux."
          accessories:
            title: "Accessoires et sur-mesure"
            text: "Complétez votre tenue avec nos accessoires soigneusement sélectionnés. Nous proposons également un service de retouches et d'ajustements pour une tenue parfaitement adaptée à votre morphologie."
        team:
          title: "Une équipe à votre service"
          p1: "Notre équipe passionnée est là pour vous guider :"
          p2: "Sophie : costumière passionnée depuis plus de 40 ans – Créative dans l'âme !"
          p3: "Charlotte : qui rejoint sa mère en 2016 après 7 ans d'expérience dans le marketing et la mode à Paris – Passionnée de robes de mariées !"
          p4: "Sandra : qui rejoint l'équipe en 2018, elle sublime toutes les tenues grâce à ses talents de couture et retouches – Experte couture."
          p5: "Célia : qui découvre l'équipe en plein Festival de Cannes 2022 après 20 ans d'expérience à l'Opéra de Monaco comme habilleuse et couturière. Couturière créative et minutieuse !"
          p6: "Que vous recherchiez une robe de mariée romantique, une tenue de soirée élégante ou un costume d'exception."
          p7: "Nous mettons notre savoir-faire à votre service pour que vous resplendissiez lors de vos événements."
        universe:
          title: "Notre univers"
          p1: "Plongez dans l'univers d'Autour D'Un Soir, où l'élégance rencontre l'exception. Notre boutique de Cannes vous accueille dans un cadre raffiné pour vous accompagner dans le choix de vos tenues de soirée."
          p2: "Depuis notre création en 1980, nous avons à cœur de vous offrir une expérience unique, alliant conseils personnalisés et sélection rigoureuse de nos pièces. Chaque visite est l'occasion de découvrir des créations qui sauront sublimer vos moments les plus précieux."
          p3: "Découvrez notre collection soigneusement sélectionnée de robes de mariée, tenues de soirée et costumes. Chaque pièce est choisie pour sa qualité, son élégance et son caractère unique."
          p4: "Nous travaillons avec des créateurs reconnus et sélectionnons uniquement des pièces qui répondent à nos critères d'excellence. Des matières nobles aux finitions soignées, chaque détail compte pour vous offrir le meilleur."
          p5: "Que vous optiez pour la location ou l'achat, nous vous garantissons des tenues impeccables, entretenues avec le plus grand soin. Notre objectif : vous permettre de briller lors de vos événements les plus importants."
        google_reviews:
          title: "Avis clients"
          based_on: "Base sur %{count} avis Google"
          view_all: "Voir tous les avis sur Google"