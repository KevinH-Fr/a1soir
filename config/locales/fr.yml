        articles:
          perimetre:
            a1: { title: "Application des CGV", content: "Les présentes Conditions Générales de Vente (les « CGV ») sont applicables dès que vous accédez à la Boutique en ligne Autour D'Un Soir URL : https://a1soir.com/ (le « Site Web ») ou passez des commandes par téléphone. Toutefois, les présentes CGV ne s'appliquent pas à tout achat de produits à la Boutique Autour D'Un Soir de Cannes." }
            a2: { title: "Définitions", content: "Les références à « nous » ou « notre » dans le cadre de ces CGV désigne la société Autour D'Un Soir, quand les références à « vous » ou « votre » vous désigne, en qualité d'utilisateur du Site Web." }
            a3: { title: "Acceptation des CGV", content: "Nous vous demandons et remercions de lire attentivement ces CGV avant d'utiliser le Site Web et de passer votre commande. En accédant à l'une quelconque des parties du Site Web ou en commandant des produits sur le Site Web, vous acceptez être soumis à ces CGV. Nous vous recommandons de garder un exemplaire de ces CGV afin de pouvoir vous y référer ultérieurement." }
            a4: { title: "Langue et applicabilité", content: "Ces CGV sont uniquement disponibles en français et sont applicables à toute commande livrée en France." }
          contrat:
            a1: { title: "Disponibilité des produits", content: "Tous les produits ou services proposés à la vente sur le Site Web le sont sous réserve de leur disponibilité." }
            a2: { title: "Finalisation de la commande", content: "La finalisation de votre commande constitue l'acceptation de notre offre, c'est-à-dire qu'elle confirme votre volonté d'acquérir les produits ou services tels que décrits sur le Site Web, avec acceptation du prix proposé et reconnaissance que la passation de cette commande génère une obligation de paiement de votre part. Aussi, lorsque vous confirmez votre commande, vous acceptez d'être lié à notre entreprise par un contrat de vente, sous réserve de la disponibilité des produits et services et de la validation de votre paiement dans les conditions prévues ci-après." }
            a3: { title: "Usage personnel", content: "Est ici rappelé que le Site Web est exclusivement destiné aux consommateurs particuliers, dans le cadre d'un usage personnel, y compris pour des cadeaux personnels, et ne devront être ni revendus, ni utilisés dans un contexte commercial, ni utilisés en vue de réaliser un bénéfice commercial. Nous nous réservons la possibilité de refuser les commandes de quantité multiple d'un même article émanant d'un seul client ou destinées à une seule adresse postale." }
          deroulement:
            a1: { title: "Sélection des articles", content: "Vous pouvez choisir des articles dans notre gamme de produits et les mettre dans votre « Panier » en cliquant sur le bouton « Ajouter au Panier »." }
            a2: { title: "Processus d'achat", content: "En cliquant sur le bouton « Commander », vous initiez le processus d'achat des produits figurant dans votre Panier. Une page listant les produits que vous souhaitez acheter s'ouvre. Cette page indique la référence, la taille, le prix et la quantité d'articles que vous êtes sur le point d'acheter, et précise notamment les modes de livraison et les coûts liés applicables à votre commande, ainsi que tous les autres services et options que nous proposons ; vous validez le contenu de votre panier et les options que vous souhaitez retenir. Il vous sera alors demandé de nous communiquer les données personnelles vous concernant ; il vous sera également demandé de sélectionner votre mode de paiement, d'indiquer les informations y-afférentes." }
            a3: { title: "Acceptation des CGV", content: "Au moment de remplir vos données personnelles vous avez obligation de cocher la case « j'accepte les conditions générales de vente » (présentées ici) sans quoi vous ne pourrez pas valider votre commande. En cliquant sur le bouton « Commander », vous finalisez la commande des produits figurant dans le Panier. La passation de votre commande par Internet constitue un contrat de vente entre vous et nous, sous réserve de la disponibilité des produits et services commandés et de la validité du moyen de paiement que vous utilisez." }
            a4: { title: "Courriel de confirmation", content: "Vous recevrez automatiquement un courriel confirmant la réception et les détails de votre commande (« le Courriel de Confirmation de commande »). Nous vous recommandons d'imprimer et de conserver le Courriel de Confirmation. Le Courriel de Confirmation ne constitue pas une confirmation de la disponibilité des produits ; il s'agit simplement d'un accusé de réception automatique qui confirme le fait que nous avons reçu votre commande." }
            a5: { title: "Courriel de livraison", content: "Nous vous enverrons un second courriel, qui constituera la confirmation de la disponibilité des produits commandés (le « Courriel de Livraison »), que nous vous recommandons également d'imprimer et de conserver. Si aucun des produits commandés n'est disponible, votre commande sera annulée, et votre carte bancaire ne sera pas débitée. Si une partie seulement des produits est disponible, ceux-ci vous seront envoyés conformément à ces CGV, et vous ne paierez que les produits livrés. Il vous appartient de conserver des copies des documents concernant votre commande (le Courriel de Confirmation, le Courriel de Livraison, ces CGV, et tout autre document utile). Par ailleurs, si le montant de votre commande excède 120 euros, nous conserverons une copie de votre commande dans nos dossiers, pour la durée prévue par la loi. Pendant cette durée, vous pouvez demander une copie de votre commande à n'importe quel moment. Dans ce cas, nous nous réservons le droit de vous facturer les coûts relatifs à la récupération et à l'envoi du document demandé." }
          prix_frais:
            intro: "Tous les prix indiqués sur le Site Web comprennent la taxe à la valeur ajoutée, au taux légal en vigueur à la date de facturation. Les prix indiqués sur le Site Web sont en euros et n'incluent pas les frais d'expédition. En dépit de tous nos efforts, il peut exceptionnellement arriver que des produits référencés sur le Site Web aient un prix erroné. Si le prix exact d'un produit est inférieur au prix indiqué, nous vous facturerons le prix inférieur et vous enverrons le produit. Si le prix exact d'un produit est supérieur au prix indiqué, nous vous facturerons le prix indiqué, sauf si celui-ci est dérisoire et manifestement erroné, auquel cas nous vous contacterons afin d'obtenir vos instructions, ou nous annulerons votre commande et vous informerons de cette annulation. Nos frais d'expédition sont les suivants et apparaîtrons dès la validation de votre commande avant le paiement:"
          livraison:
            a1: { title: "Zones de livraison", content: "Nous ne livrons nos produits qu'en France Métropolitaine et Corse, à l'exclusion de tous autres territoires y compris les sites des armées." }
            a2: { title: "Délais de livraison", content: "Les délais de livraisons estimés sont de : 7 jours ouvrés (à l'exclusion des samedi, dimanches et jours fériés) à compter de l'envoi du Courriel de Livraison. Le délai peut être légèrement plus long lorsque les produits doivent être livrés dans des zones d'accès difficile. Nous ferons nos meilleurs efforts pour livrer les produits commandés dans le délai indiqué dans le Courriel de Livraison." }
            a3: { title: "Garantie des délais", content: "Même si nous faisons tout notre possible pour livrer vos produits dans le respect des délais définis ci-dessus, les dates de livraison ne sont que des estimations, elles ne sont pas garanties, et elles ne sauraient être invoquées à notre encontre. Du retard ne peut pas être exclu, notamment du fait des services postaux, du ou des prestataires missionnés, des transporteurs, de la logistique ou encore des conditions météorologiques. Toutefois, le délai maximum de trente (30) jours à compter de la date de réception du Courriel de Livraison est garanti." }
            a4: { title: "Retard de livraison", content_html: "Au cas où nous serions dans l'impossibilité de respecter le délai de livraison initialement prévu et figurant dans le Courriel de Livraison, nous vous en informerons dès que possible, en indiquant en même temps un nouveau délai de livraison estimé, sans encourir de responsabilité à votre égard, étant toutefois précisé que vous pouvez annuler votre commande si le délai total de livraison dépasse trente (30) jours. Pour annuler votre commande, vous devez nous envoyer un courriel via le formulaire de contact %{contact_link}. Nous recréditerons alors la carte bancaire utilisé pour passer la commande, dans les quatorze (14) jours de la réception du courriel notifiant son annulation." }
            a5: { title: "Vérification de la réception", content: "Si vous n'avez pas reçu votre commande dans les délais indiqués, nous vous remercions de vérifier, dans un premier temps, auprès des agents de votre bureau de poste que ces derniers ne détiennent pas votre colis. S'ils vous confirment qu'ils ne détiennent par vos produits, nous vous remercions de bien vouloir nous contacter et nous ferons de notre mieux pour vous assister. Tous les délais de livraison peuvent être sujets à des retards dus à des périodes saisonnières ou de pleine activité, à des conditions climatiques ou circonstances imprévues, notamment sanitaires, mais nous ferons tout notre possible pour vous adresser votre commande dans les délais indiqués. Durant ces périodes exceptionnelles de pleine activité (ex : soldes, Noël) ou de conditions climatiques ou sanitaires particulièrement défavorables, nous vous saurions gré de nous laisser un jour de plus avant de nous contacter. Nous vous remercions de noter que le transporteur requerra une signature à la livraison et ne vous remettra pas les produits sans signature." }
            a6: { title: "Livraisons multiples", content: "Si vous passez commande de nombreux produits, nous pouvons être obligés de livrer vos produits en plusieurs fois. S'il est nécessaire de procéder à plus d'une livraison, vous en serez informé à l'avance." }
            a7: { title: "Contrôle du colis", content_html: "Nous attirons votre attention sur la nécessité, lors de la réception de votre colis de contrôler son état général. Vous serez responsables du colis et de son contenu lorsqu'il vous aura été remis. En cas de problème (colis ouvert, colis vide, contenu abîmé), vous devez refuser le colis et contacter notre Service Client pour signaler le problème et la raison du refus (service client : %{contact_link}). Nous vous informons qu'en cas de manquant sans réserve émise, Autour D'Un Soir ne pourra être tenu pour responsable et nous ne pourrons garantir un remboursement." }
            a8: { title: "Adresse de livraison", content: "Votre commande sera envoyée à l'adresse de livraison que vous aurez indiquée lors de votre commande. Nous ne saurions être tenus pour responsables si cette adresse de livraison est incorrecte ou incomplète." }
          cgl:
            a1: { title: "Objet de la location", content: "Les présentes conditions générales régissent la location de tenues et accessoires proposés par Autour D'Un Soir. Chaque location est nominative et personnelle." }
            a2: { title: "Réservation", content: "La réservation d'une location peut s'effectuer en boutique uniquement. Elle devient définitive après versement d'un acompte de 30% du montant total. Le solde est à régler au plus tard lors du retrait de la tenue." }
            a3: { title: "Durée de location", content: "La durée standard de location est de 3-4 jours. Les dates de retrait et de retour sont précisées lors de la réservation. Toute prolongation doit être validée au préalable par Autour D'Un Soir et fera l'objet d'une facturation complémentaire." }
            a4: { title: "Caution", content_html: "Une caution proportionnelle à la valeur de la tenue est demandée lors du retrait.<br>Cette caution pourra être conservée en tout ou partie en cas de :<br>• Retard de restitution<br>• Dommages ou salissures importantes<br>• Perte ou vol de l'article loué<br>• Non-respect des conditions de location" }
            a5: { title: "Essayage et retouches", content: "Un essayage préalable est vivement recommandé. Des retouches mineures peuvent être effectuées gratuitement dans la limite du raisonnable. Les retouches importantes feront l'objet d'un devis et d'une facturation supplémentaire." }
            a6: { title: "Responsabilité du locataire", content_html: "Le locataire s'engage à :<br>• Prendre soin de la tenue louée<br>• Ne pas modifier ou altérer l'article<br>• Ne pas sous-louer la tenue<br>• Restituer la tenue dans les délais convenus<br>• Signaler immédiatement tout dommage accidentel" }
            a7: { title: "Annulation", content_html: "En cas d'annulation par le client :<br>• Dans les 14 jours suivants la réservation : remboursement intégral<br>• Après 14 jours : émission d'un avoir valable 1 an.<br>L'acompte reste acquis à Autour D'Un Soir sauf cas de force majeure justifié." }
            a8: { title: "Entretien", content: "L'entretien et le nettoyage des tenues sont inclus dans le prix de location. Le locataire ne doit en aucun cas nettoyer lui-même la tenue. En cas de salissures exceptionnelles nécessitant un traitement spécial, des frais supplémentaires pourront être facturés." }
            a9: { title: "Assurance", content: "Nous recommandons au locataire de souscrire une assurance couvrant les dommages éventuels de type assurance de responsabilité civile." }
          paiement:
            a1: { title: "Modes de paiement", content: "Le paiement de vos produits devra être effectué par carte bancaire, American Express ou Apple Pay, suivant les indications figurant sur la page concernant le paiement." }
            a2: { title: "Débit de la carte", content: "Le paiement complet du prix, y compris les frais d'expédition et tous frais supplémentaires pour des services que vous aurez commandés, sera débité de votre carte bancaire ou de votre compte Apple Pay, après vérification de la disponibilité des produits commandés, au moment ou peu de temps avant l'expédition des produits chez vous. Nous ne vous livrerons les produits que si votre paiement est effectif." }
            a3: { title: "Validation de la carte", content: "Vous confirmez que la carte bancaire utilisée est la vôtre. Tous les détenteurs de cartes bancaires sont soumis à des contrôles de validation et à l'autorisation par l'émetteur de la carte. Si l'émetteur de votre carte refuse d'autoriser le paiement, nous serons en droit de refuser de procéder à la livraison de votre commande et ne serons pas responsables de tout retard ou de toute absence de livraison. Nous vous enverrons un courriel pour vous informer du refus." }
            a4: { title: "Sécurité des données bancaires", content: "Vos données bancaires seront traitées de manière sécurisée, conformément à notre Déclaration de Protection de la Vie Privée, que vous pouvez consulter plus haut dans ce document." }
          retractation:
            a1: { title: "Retour des produits", content: "Vous pouvez nous retourner uniquement les produits qui ont été achetés directement sur le Site Web. Si vous achetez vos produits dans notre boutique de Cannes, les produits devront être retournés au magasin. Nous nous réservons le droit de refuser le retour de marchandises qui n'auront pas été retournées dans le respect des stipulations prévues ci-après et les frais de transport pour le renvoi de chaque marchandise au lieu de livraison indiqué seront à votre charge." }
            a2: { title: "Conditions de rétractation", content: "Si, pour quelque raison que ce soit, vous n'étiez pas satisfait de nos produits ou souhaitiez annuler votre commande, vous pouvez exercer votre droit de rétractation au plus tard dans les quatorze (14) jours suivants la réception de votre commande, et vous serez remboursé conformément aux dispositions de cet article, à condition : que les produits soient retournés leur conditionnement d'origine permettant leur transport à l'adresse mentionnée par le service client ; que les produits soient dans leur état initial avec l'étiquette attachée au produit, sans avoir été endommagés, tachés, lavés, modifiés ou portés (à l'exception de l'essayage), en y joignant l'emballage original et tous accessoires se rapportant aux produits, tels que les emballages ou notices d'utilisation, ainsi que la facture d'origine. Si le délai de rétractation de quatorze (14) jours expire un samedi, un dimanche ou un jour férié, ce délai est prolongé jusqu'au jour ouvré suivant. Pour tout achat réalisé sur notre Site Web, les demandes de rétractation, quel que soit le mode de livraison, devront toutes nous être adressées via l'adresse de contact sur notre site, ou par tout autre moyen de votre choix exprimant explicitement votre volonté de vous rétracter." }
            a3: { title: "Remboursement", content: "Conformément aux dispositions de l'article L 221-24 du code de la consommation, nous rembourserons le prix des produits de votre commande ainsi que les frais de livraison en recréditant le moyen de paiement utilisé lors de votre commande initiale. Nous effectuerons ce remboursement dans les meilleurs délais et au plus tard dans les quatorze (14) jours suivants la réception des marchandises que vous nous aurez renvoyés. A défaut de remboursement sous ce délai, les sommes que nous vous devrions produiront intérêts aux conditions suivantes : 10 jours après l'expiration du délai : taux d'intérêt légal ; 10-20 jours de retard : taux d'intérêt de 5% ; 20-30 jours de retard : taux d'intérêt de 10% ; 30-60 jours de retard : taux d'intérêt de 20% ; 60-90 jours de retard : taux d'intérêt de 50% ; Au-delà de 90 jours : 5 points supplémentaires par nouveau mois de retard." }
            a4: { title: "Soin des produits", content: "Nous vous demandons de prendre soin des produits pendant qu'ils sont en votre possession et de nous les retourner à l'adresse indiquée aux présentes, sans retard excessif et au plus tard dans les quatorze (14) jours suivants l'exercice de votre droit de rétractation. Veuillez prendre acte du fait que si vous ne prenez pas soin des produits, ou si vous ne nous les retournez pas en respectant les conditions prévues au présent article, vous ne pourrez pas réclamer le remboursement des produits." }
          garanties:
            a1: { title: "Champ d'application", content: "Vous bénéficiez des garanties énumérées au présent article 12 uniquement dans la mesure où les produits ont été achetés directement sur le Site Web." }
            a2: { title: "Garantie légale de conformité", content_html: "Vous bénéficiez des garanties légales suivantes : La garantie légale de conformité (articles L.217-4 et suivants du Code de la consommation), Si vos produits sont non conformes (par exemple s'ils ne correspondent pas à la description donnée sur le site ou à votre commande), vous bénéficiez d'un délai de deux ans à compter de la délivrance du bien pour contacter notre Service Clientèle par courriel via le formulaire de contact %{contact_link}, ou par courrier postal à l'adresse suivante : Autour d'Un Soir, 29 Boulevard Carnot, 06400 Cannes, France, et nous retourner les produits non conformes. Nous vous renverrons alors des produits de remplacement, lorsque ceux-ci sont disponibles. Si nous ne sommes pas en mesure de remplacer les produits non conformes dans un délai de trente (30) jours, vous pouvez : demander un remboursement intégral des produits non conformes ou conserver les produits non conformes et nous demander une réduction d'une partie du prix, qui sera déterminé au cas par cas." }
            a3: { title: "Preuve du défaut", content: "Vous êtes dispensés de rapporter la preuve de l'existence du défaut de conformité du produit durant les vingt-quatre (24) mois suivant la délivrance du bien." }
            a4: { title: "Indépendance des garanties", content: "Cette garantie légale de conformité s'applique indépendamment de toute garantie commerciale éventuellement souscrite et ainsi que de la nature du produit." }
            a5: { title: "Garantie contre les vices cachés", content: "La garantie légale contre les vices cachés (articles 1641 et suivants du Code civil). Si vous parvenez à prouver le vice caché d'un produit, nous sommes légalement tenus de réparer toutes les conséquences d'un tel vice caché (articles 1641 et suivants du Code civil). Vous pourrez alors choisir entre la résolution de la vente ou une réduction du prix (conformément à l'article 1644 du code civil)." }
            a6: { title: "Coûts de renvoi", content: "En cas de remplacement des produits ou de remboursement, nous prenons en charge vos coûts de renvoi des produits." }
          informations_personnelles:
            a1: { title: "Exactitude des informations", content: "En communiquant des informations sur le Site Web, vous garantissez que vous utilisez votre véritable identité et que toutes les informations fournies sont vraies, précises, à jour et complètes au moment où vous nous fournissez ces informations." }
            a2: { title: "Mise à jour des informations", content: "Si vous constatez qu'une ou plusieurs des informations transmises sont incorrectes ou ne sont plus valables, vous devrez les modifier. A défaut, nous ne pourrons être tenus pour responsables des conséquences qui pourraient en résulter." }
            a3: { title: "Utilisation des informations", content: "Les informations personnelles que vous nous fournissez en utilisant le Site Web seront enregistrées et utilisées uniquement dans le respect de notre Déclaration de Protection de la Vie Privée, qui peut être consultée plus haut." }
            a4: { title: "Stockage des données", content: "En passant une commande, vous acceptez et comprenez que nous serons en droit de stocker et traiter vos données personnelles. Nous respectons pleinement la vie privée des personnes qui consultent et utilisent ce Site Web." }
          responsabilite:
            a1: { title: "Limitation de responsabilité", content: "Nous ne serons pas responsables des pertes ou dommages que vous pourriez subir si de tels pertes ou dommages résultent d'un cas de force majeure, s'ils sont imputables au fait imprévisible et insurmontable d'un tiers, ou s'ils vous sont imputables." }
            a2: { title: "Manquement aux CGV", content: "En cas de manquement de votre part à ces CGV, nous vous enverrons une mise en demeure d'y remédier. Si cette mise en demeure reste sans effet après un délai de quinze (15) jours, nous pourrons, de plein droit, vous refuser le droit d'accès au Site Web, ou refuser vos commandes futures." }
          disponibilite_site:
            a1: { title: "Disponibilité du site", content: "Le Site Web est mis à votre disposition en l'état. Aucune garantie n'est apportée quant au fait que le Site Web soit disponible sans interruption 24 heures sur 24 et de façon pleinement opérationnelle. Par exemple, l'accès au Site Web peut être interrompu sans préavis en cas de problèmes techniques ou encore pour des raisons de maintenance." }
            a2: { title: "Protection de votre appareil", content: "Il est de votre responsabilité de protéger votre ordinateur ou tout autre appareil numérique utilisé pour accéder au Site Web. Nous ne serons pas responsables des dommages qui pourraient être causés à votre ou vos appareils, ou de la perte de données qui pourrait résulter de l'utilisation du Site Web." }
          commentaires_reclamations:
            content_html: "Nous vous invitons à faire des commentaires sur notre service afin que nous puissions continuellement l'améliorer. Notre objectif est de régler les problèmes rapidement et équitablement. Nous vous remercions de nous informer de tous vos commentaires, questions ou réclamations par courriel à notre Service Clientèle via la rubrique « Contact » sur la Boutique en ligne (%{contact_link}). Vous pouvez également nous appeler au numéro suivant 04 93 45 17 17. Si vous souhaitez déposer une réclamation, indiquez-le clairement. Notre objectif est de répondre à votre réclamation dans un délai de sept (7) jours ouvrés, soit en y apportant une solution, soit en vous indiquant les modalités du traitement de votre réclamation."
          propriete_intellectuelle:
            a1: { title: "Absence de droit de propriété", content: "Votre utilisation du Site Web ne vous confère aucun droit de propriété intellectuelle sur le Site Web et son contenu. Vous n'avez notamment aucun droit sur nos créations protégées par le droit d'auteur, sur nos dessins et modèles et sur nos marques, ni sur ceux appartenant à des tiers." }
            a2: { title: "Usage personnel", content: "Nous vous mettons à disposition le Site Web uniquement à des fins d'utilisation personnelles et non commerciales. Le contenu du Site Web ne saurait être utilisé pour des besoins autres quels qu'ils soient, sans notre autorisation expresse et par écrit." }
          modification_cgv:
            content: "Nous nous réservons le droit de procéder à des modifications de notre Site Web et des présentes CGV à tout moment. Votre utilisation du Site Web et vos commandes seront soumises aux CGV en vigueur au moment de votre utilisation du Site Web ou de votre commande de produits, à moins qu'un changement de ces CGV ne soit exigé par la loi ou par une autorité gouvernementale (auquel cas ce changement s'appliquera également à toutes les commandes que vous avez déjà passées)."
          non_renonciation:
            content: "Le fait pour l'une ou l'autre des parties de ne pas agir au titre de ces CGV ne constitue pas pour autant une renonciation au droit d'agir, sauf renonciation expresse et écrite."
          stipulations_finales:
            a1: { title: "Législation applicable", content: "Ces CGV sont régies par la législation française." }
            a2: { title: "Divisibilité des stipulations", content: "Si l'une quelconque des stipulations des présentes CGV est jugée invalide, nulle ou inapplicable pour quelque raison que ce soit, cette stipulation sera considérée comme divisible du reste des CGV et n'affectera pas la validité et l'applicabilité des autres stipulations des CGV." }
            a3: { title: "Marques déposées", content: "Autour D'Un Soir ainsi que les marques qui y sont vendues sur le site sont des marques déposées." }
          informations_legales:
            a1: { title: "Éditeur du site", content: "Le Site Web est édité par Autour D'Un Soir, Société à responsabilité limitée au capital social de 75 000,00 Euro, ayant son siège social au 29 boulevard Carnot, 06400 Cannes, France, immatriculée au Registre du Commerce et des Sociétés de Cannes sous le numéro 880 559 414, tél. 0033 (0)4.93.45.17.17" }
            a2: { title: "Contact", content_html: "Vous pouvez écrire à notre service client via la rubrique « Contacts » sur la Boutique en ligne (%{contact_link}). Par téléphone du mardi au vendredi de 10h à 12h et de 15h à 19h et le samedi de 10h à 16h au numéro suivant : 04 93 45 17 17." }
